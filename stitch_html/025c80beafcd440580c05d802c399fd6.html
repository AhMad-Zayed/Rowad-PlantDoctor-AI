<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>

<title>Smart Plant Doctor AI - Splash Screen</title>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                        "surface-variant": "#e5e1e7",
                        "on-secondary-fixed": "#002109",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .progress-bar-animation {
            animation: progress 2s ease-in-out infinite;
        }
        
        @keyframes progress {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .pulse-logo {
            animation: pulse 2.5s infinite;
        }
        
        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 99, 27, 0.2); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(13, 99, 27, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(13, 99, 27, 0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface h-screen w-screen flex flex-col items-center justify-between overflow-hidden relative">
<!-- Decorative Background Elements -->
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 -translate-y-1/2 translate-x-1/4"></div>
<div class="absolute bottom-0 left-0 w-80 h-80 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-30 translate-y-1/3 -translate-x-1/4"></div>
<div class="flex-1 flex flex-col items-center justify-center w-full px-container-padding z-10">
<!-- Logo Section -->
<div class="fade-in-up flex flex-col items-center justify-center mb-stack-lg" style="animation-delay: 0.2s;">
<div class="w-32 h-32 rounded-full bg-primary-container text-primary flex items-center justify-center pulse-logo mb-stack-md shadow-lg">
<span class="material-symbols-outlined text-[64px]" data-icon="potted_plant" data-weight="fill">potted_plant</span>
</div>
<!-- Typography -->
<h1 class="font-display-lg text-display-lg text-primary text-center mb-stack-sm md:font-display-lg md:text-display-lg font-headline-lg-mobile text-headline-lg-mobile">
                طبيب النباتات الذكي
            </h1>
<p class="font-title-lg text-title-lg text-on-surface-variant text-center max-w-sm">
                تعرف على نباتاتك واعتنِ بها بسهولة
            </p>
</div>
</div>
<!-- Progress Indicator -->
<div class="w-full px-container-padding pb-12 z-10 fade-in-up" style="animation-delay: 0.6s;">
<div class="w-full h-1 bg-surface-variant rounded-full overflow-hidden relative">
<div class="absolute top-0 right-0 h-full w-1/3 bg-primary rounded-full progress-bar-animation"></div>
</div>
<p class="font-label-lg text-label-lg text-on-surface-variant text-center mt-stack-sm opacity-70">
            جاري التحميل...
        </p>
</div>
<!-- Initialization Script (Simulation) -->
<script>
        document.addEventListener("DOMContentLoaded", () => {
            // Simulate a brief loading time before "redirecting" or fading out
            setTimeout(() => {
                document.body.style.transition = "opacity 0.5s ease-out";
                document.body.style.opacity = "0";
            }, 3500); // 3.5 seconds
        });
    </script>
</body></html>

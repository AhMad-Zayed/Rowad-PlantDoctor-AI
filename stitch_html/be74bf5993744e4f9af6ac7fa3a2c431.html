<script>
        // Simple script to simulate progress and step transitions for demonstration
        document.addEventListener('DOMContentLoaded', () => {
            const circle = document.getElementById('progress-circle');
            const radius = circle.r.baseVal.value;
            const circumference = radius * 2 * Math.PI;
            
            circle.style.strokeDasharray = `${circumference} ${circumference}`;
            circle.style.strokeDashoffset = circumference;

            function setProgress(percent) {
                const offset = circumference - percent / 100 * circumference;
                circle.style.strokeDashoffset = offset;
            }

            let progress = 0;
            const interval = setInterval(() => {
                progress += 2;
                setProgress(progress);

                // Simulate step transitions
                if (progress === 40) {
                    updateStepState('step-2', 'completed', 'eco');
                    updateStepState('step-3', 'active', 'health_and_safety');
                } else if (progress === 70) {
                    updateStepState('step-3', 'completed', 'health_and_safety');
                    updateStepState('step-4', 'active', 'list_alt');
                } else if (progress >= 100) {
                    clearInterval(interval);
                    updateStepState('step-4', 'completed', 'list_alt');
                    // Usually redirect to results page here
                }
            }, 100);

            function updateStepState(stepId, state, iconName) {
                const stepEl = document.getElementById(stepId);
                if (!stepEl) return;
                
                const iconContainer = stepEl.querySelector('div');
                const textSpan = stepEl.querySelector('span:not(.material-symbols-outlined)');
                const iconSpan = stepEl.querySelector('.material-symbols-outlined');

                if (state === 'completed') {
                    stepEl.classList.remove('opacity-40');
                    iconContainer.className = 'w-8 h-8 rounded-full bg-primary flex items-center justify-center shrink-0 shadow-sm transition-all duration-300';
                    iconSpan.textContent = 'check';
                    iconSpan.className = 'material-symbols-outlined text-on-primary text-[18px]';
                    iconSpan.style.fontVariationSettings = "'FILL' 0";
                    textSpan.className = 'font-title-lg text-title-lg text-on-surface line-through decoration-primary/50 opacity-70 transition-all duration-300';
                } else if (state === 'active') {
                    stepEl.classList.remove('opacity-40');
                    iconContainer.className = 'w-8 h-8 rounded-full bg-primary-container flex items-center justify-center shrink-0 border-2 border-primary border-t-transparent animate-spin transition-all duration-300';
                    iconSpan.textContent = iconName;
                    iconSpan.className = 'material-symbols-outlined text-primary text-[18px] animate-none';
                    iconSpan.style.fontVariationSettings = "'FILL' 1";
                    textSpan.className = 'font-title-lg text-title-lg text-primary font-bold transition-all duration-300';
                }
            }
        });
    </script>
